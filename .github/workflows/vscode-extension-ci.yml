name: vscode-extension-ci

on:
  push:
    branches: [main]
    paths:
      - 'apps/extension/vscode/**'
      - '.github/workflows/vscode-extension-ci.yml'
  pull_request:
    paths:
      - 'apps/extension/vscode/**'
      - '.github/workflows/vscode-extension-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: apps/extension/vscode/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit
