name: one-proxy-node-image

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'apps/node/api/**'
      - 'apps/node/web/**'
      - 'docker/one-proxy-node-base.Dockerfile'
      - 'docker/one-proxy-node.Dockerfile'
      - '.github/workflows/one-proxy-node-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Image metadata
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "IMAGE_VERSION=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "IMAGE_VERSION=ci-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build proxy-node base image
        run: docker build -f docker/one-proxy-node-base.Dockerfile -t oneproxy-node-base:${{ github.sha }} .

      - name: Tag proxy-node base release image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker tag oneproxy-node-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:${{ env.IMAGE_VERSION }}
          docker tag oneproxy-node-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest

      - name: Build proxy-node image
        run: |
          docker build -f docker/one-proxy-node.Dockerfile \
            --build-arg NODE_BASE_IMAGE=oneproxy-node-base:${{ github.sha }} \
            -t ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:${{ env.IMAGE_VERSION }} \
            -t ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:latest .

      - name: Push proxy-node base image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:${{ env.IMAGE_VERSION }}
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest

      - name: Push proxy-node image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:${{ env.IMAGE_VERSION }}
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:latest
