name: one-proxy-node-image

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'apps/node/api/**'
      - 'apps/node/web/**'
      - 'docker/one-proxy-node-base.Dockerfile'
      - 'docker/one-proxy-node.Dockerfile'
      - '.github/workflows/one-proxy-node-image.yml'
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Immutable image tag to build. Defaults to v2.1.0-rc.<run_number>.'
        required: false
        type: string
      push_image:
        description: 'Push the immutable test image to GHCR.'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Image metadata
        shell: bash
        env:
          INPUT_IMAGE_VERSION: ${{ inputs.image_version }}
          INPUT_PUSH_IMAGE: ${{ inputs.push_image }}
        run: |
          push_image=false
          push_latest=false
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            image_version="$GITHUB_REF_NAME"
            push_image=true
            push_latest=true
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            image_version="$INPUT_IMAGE_VERSION"
            if [[ -z "$image_version" ]]; then
              image_version="v2.1.0-rc.${GITHUB_RUN_NUMBER}"
            fi
            push_image="$INPUT_PUSH_IMAGE"
          else
            image_version="ci-${GITHUB_SHA::12}"
          fi
          if [[ -z "$image_version" || "$image_version" == "latest" ]]; then
            echo "invalid image version: $image_version" >&2
            exit 2
          fi
          echo "IMAGE_VERSION=$image_version" >> "$GITHUB_ENV"
          echo "PUSH_IMAGE=$push_image" >> "$GITHUB_ENV"
          echo "PUSH_LATEST=$push_latest" >> "$GITHUB_ENV"
          echo "IMAGE_SOURCE=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"
          echo "IMAGE_CREATED=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: env.PUSH_IMAGE == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build proxy-node base image
        run: |
          docker build -f docker/one-proxy-node-base.Dockerfile \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ env.IMAGE_VERSION }} \
            --label org.opencontainers.image.source=${{ env.IMAGE_SOURCE }} \
            --label org.opencontainers.image.created=${{ env.IMAGE_CREATED }} \
            -t oneproxy-node-base:${{ github.sha }} .

      - name: Tag proxy-node base image
        if: env.PUSH_IMAGE == 'true'
        run: |
          docker tag oneproxy-node-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:${{ env.IMAGE_VERSION }}
          if [[ "${{ env.PUSH_LATEST }}" == "true" ]]; then
            docker tag oneproxy-node-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest
          fi

      - name: Build proxy-node image
        shell: bash
        run: |
          tags=(-t ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:${{ env.IMAGE_VERSION }})
          if [[ "${{ env.PUSH_LATEST }}" == "true" ]]; then
            tags+=(-t ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:latest)
          fi
          docker build -f docker/one-proxy-node.Dockerfile \
            --build-arg NODE_BASE_IMAGE=oneproxy-node-base:${{ github.sha }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ env.IMAGE_VERSION }} \
            --label org.opencontainers.image.source=${{ env.IMAGE_SOURCE }} \
            --label org.opencontainers.image.created=${{ env.IMAGE_CREATED }} \
            "${tags[@]}" .

      - name: Push proxy-node base image
        if: env.PUSH_IMAGE == 'true'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:${{ env.IMAGE_VERSION }}
          if [[ "${{ env.PUSH_LATEST }}" == "true" ]]; then
            docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest
          fi

      - name: Push proxy-node image
        if: env.PUSH_IMAGE == 'true'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:${{ env.IMAGE_VERSION }}
          if [[ "${{ env.PUSH_LATEST }}" == "true" ]]; then
            docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node:latest
          fi
