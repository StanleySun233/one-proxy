name: one-proxy-node-base-image

on:
  push:
    branches: [main]
    paths:
      - 'apps/one-proxy-node/go.mod'
      - 'apps/one-proxy-node/go.sum'
      - 'docker/one-proxy-node-base.Dockerfile'
      - '.github/workflows/one-proxy-node-base-image.yml'
  pull_request:
    paths:
      - 'apps/one-proxy-node/go.mod'
      - 'apps/one-proxy-node/go.sum'
      - 'docker/one-proxy-node-base.Dockerfile'
      - '.github/workflows/one-proxy-node-base-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build proxy-node base image
        run: docker build -f docker/one-proxy-node-base.Dockerfile -t ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest .

      - name: Push proxy-node base image
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-node-base:latest
