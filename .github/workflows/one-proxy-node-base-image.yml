name: one-proxy-node-base-image

on:
  pull_request:
    paths:
      - 'apps/node/api/go.mod'
      - 'apps/node/api/go.sum'
      - 'docker/one-proxy-node-base.Dockerfile'
      - '.github/workflows/one-proxy-node-base-image.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build proxy-node base image
        run: docker build -f docker/one-proxy-node-base.Dockerfile -t oneproxy-node-base:ci .
