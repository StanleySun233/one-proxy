name: one-proxy-panel-image

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'apps/panel/api/**'
      - 'apps/panel/web/**'
      - 'docker/one-proxy-panel-base.Dockerfile'
      - 'docker/one-proxy-panel.Dockerfile'
      - 'docker/one-proxy-panel-start.sh'
      - '.github/workflows/one-proxy-panel-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Image metadata
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "IMAGE_VERSION=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "IMAGE_VERSION=ci-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build panel base image
        run: docker build -f docker/one-proxy-panel-base.Dockerfile -t oneproxy-panel-base:${{ github.sha }} .

      - name: Tag panel base release image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker tag oneproxy-panel-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel-base:${{ env.IMAGE_VERSION }}
          docker tag oneproxy-panel-base:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel-base:latest

      - name: Build control-plane image
        run: |
          docker build -f docker/one-proxy-panel.Dockerfile \
            --build-arg PANEL_BASE_IMAGE=oneproxy-panel-base:${{ github.sha }} \
            -t ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel:${{ env.IMAGE_VERSION }} \
            -t ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel:latest .

      - name: Push panel base image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel-base:${{ env.IMAGE_VERSION }}
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel-base:latest

      - name: Push control-plane image
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel:${{ env.IMAGE_VERSION }}
          docker push ghcr.io/${{ env.OWNER_LC }}/oneproxy-panel:latest
