name: one-proxy-panel-base-image

on:
  pull_request:
    paths:
      - 'apps/panel/api/go.mod'
      - 'apps/panel/api/go.sum'
      - 'apps/panel/web/package.json'
      - 'apps/panel/web/package-lock.json'
      - 'docker/one-proxy-panel-base.Dockerfile'
      - '.github/workflows/one-proxy-panel-base-image.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build panel base image
        run: docker build -f docker/one-proxy-panel-base.Dockerfile -t oneproxy-panel-base:ci .
