openapi: 3.1.0
info:
  title: One Proxy Control Plane API
  version: 0.3.0
components:
  securitySchemes:
    controlPlaneAccessToken:
      type: apiKey
      in: header
      name: X-One-Proxy-Access-Token
    nodeToken:
      type: apiKey
      in: header
      name: X-One-Proxy-Node-Token
  parameters:
    TenantIDHeader:
      name: X-One-Proxy-Tenant-ID
      in: header
      required: true
      schema:
        type: string
      description: Required for non-super_admin tenant-scoped console requests.
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
        account:
          type: string
        role:
          type: string
        status:
          type: string
        mustRotatePassword:
          type: boolean
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TenantMembership:
      type: object
      properties:
        tenantId:
          type: string
        tenantName:
          type: string
        role:
          type: string
          enum:
            - tenant_admin
            - user
        joinedAt:
          type: string
          format: date-time
    TenantMembershipAccount:
      allOf:
        - $ref: "#/components/schemas/TenantMembership"
        - type: object
          properties:
            accountId:
              type: string
            account:
              type: string
    AccountSession:
      type: object
      properties:
        account:
          $ref: "#/components/schemas/Account"
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        mustRotatePassword:
          type: boolean
        tenantMemberships:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"
        activeTenantId:
          type:
            - string
            - "null"
paths:
  /healthz:
    get:
      responses:
        "200":
          description: Envelope health response
  /api/auth/login:
    post:
      responses:
        "200":
          description: Envelope account session response including tenantMemberships and activeTenantId
        "401":
          description: Invalid credentials
  /api/auth/refresh:
    post:
      responses:
        "200":
          description: Envelope refreshed account session response including tenantMemberships and activeTenantId
        "401":
          description: Invalid refresh token
  /api/auth/logout:
    post:
      security:
        - controlPlaneAccessToken: []
      responses:
        "200":
          description: Envelope logout response
        "401":
          description: Invalid access token
  /api/overview:
    get:
      security:
        - controlPlaneAccessToken: []
      responses:
        "200":
          description: Envelope overview response
  /api/proxy/extension/bootstrap:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant-scoped extension bootstrap response including proxyToken
  /api/accounts:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope account list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope account created response
  /api/accounts/{accountId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope account updated response
  /api/tenants:
    get:
      security:
        - controlPlaneAccessToken: []
      responses:
        "200":
          description: Envelope tenant list response
    post:
      security:
        - controlPlaneAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                initialAdminAccountId:
                  type: string
      responses:
        "201":
          description: Envelope tenant created response with initial tenant_admin membership
  /api/tenants/{tenantId}:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant detail response
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant deleted response
  /api/tenants/{tenantId}/memberships:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant membership list response
  /api/tenants/{tenantId}/memberships/{accountId}:
    put:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - tenant_admin
                    - user
      responses:
        "200":
          description: Envelope tenant membership upsert response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope tenant membership deleted response
  /api/nodes:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node list response
  /api/nodes/{nodeId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node deleted response
  /api/nodes/{nodeId}/access/manage:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node manage access response
        "403":
          description: Account cannot manage this node
  /api/nodes/bootstrap/token:
    post:
      security:
        - controlPlaneAccessToken: []
      responses:
        "201":
          description: Envelope bootstrap token response
  /api/nodes/enroll:
    post:
      responses:
        "201":
          description: Envelope pending node enrollment response
        "400":
          description: Invalid enrollment payload
  /api/nodes/{nodeId}/approve:
    post:
      security:
        - controlPlaneAccessToken: []
      responses:
        "200":
          description: Envelope node approval response with node token and trust material
        "400":
          description: Invalid approval request
  /api/nodes/exchange:
    post:
      responses:
        "200":
          description: Envelope node enrollment exchange response
        "400":
          description: Invalid enrollment exchange payload
  /api/proxy/extension/page/status:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope extension page status response
  /api/proxy:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope chain created response
  /api/proxy/{chainId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain deleted response
  /api/proxy/scopes:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain scope list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope chain scope created response
  /api/proxy/scopes/{scopeId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain scope updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope chain scope deleted response
  /api/proxy/links:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node link list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope node link created response
  /api/proxy/links/{linkId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node link updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node link deleted response
  /api/proxy/route-groups:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule group list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope route rule group created response
  /api/proxy/route-groups/{groupId}:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule group response
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule group updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule group deleted response
  /api/proxy/route-groups/{groupId}/delete-impact:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule group delete impact response
  /api/proxy/routes:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule list response
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "201":
          description: Envelope route rule created response
  /api/proxy/routes/{ruleId}:
    patch:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule updated response
    delete:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope route rule deleted response
  /api/policies/revisions:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope policy revision list response
  /api/policies/publish:
    post:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope policy publish response
        "400":
          description: Invalid policy graph
  /api/nodes/health:
    get:
      security:
        - controlPlaneAccessToken: []
      parameters:
        - $ref: "#/components/parameters/TenantIDHeader"
      responses:
        "200":
          description: Envelope node health list response
  /api/node/agent/policy:
    get:
      security:
        - nodeToken: []
      responses:
        "200":
          description: Envelope node policy payload
        "401":
          description: Invalid node token
  /api/node/agent/heartbeat:
    post:
      security:
        - nodeToken: []
      responses:
        "200":
          description: Envelope node health updated response
        "401":
          description: Invalid node token
  /api/node/agent/proxy/token/validate:
    post:
      security:
        - nodeToken: []
      responses:
        "200":
          description: Envelope proxy token validation response
        "401":
          description: Invalid node token or proxy token
  /api/node/agent/cert/renew:
    post:
      security:
        - nodeToken: []
      responses:
        "200":
          description: Envelope node certificate renewed response
        "401":
          description: Invalid node token
